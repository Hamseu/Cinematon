<div class="movie-card">
  <img [src] = "film.imageurl"> 
  <h3>{{ film.title }}</h3>

  <p>{{ film.genre }}</p>
  <p>{{film.description}} </p>

  <p>Year: {{ film.release_year }}</p>

  <p>Length: {{ film.length }} min</p>

  <button [routerLink]="['/ticket', film.film_id]">Buy Ticket</button>
</div>
