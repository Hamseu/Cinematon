<div class="movie-card">
  <img class = "image" [src] = "film.imageurl" (error) = "onError($event)"> 
  <h3>{{ film.title }}</h3>

  <p class = "outer-genres" >{{ film.genre }}</p>

  <p>Year: {{ film.release_year }}</p>

  <p>Length: {{ film.length }} min</p>

  <button class = "buter" [routerLink]="['/ticket', film.film_id]">Buy Ticket</button>
</div>
