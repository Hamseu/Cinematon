<div class = "grid-container half-half">
  @if(film(); as f){
  <div class = movie-screen>
  <h2 class = "film-title">{{f.title}}</h2>

  <p class = "genres">{{f.genre}}</p>

  <p class = "descritption-plain">{{f.description}}</p>
  <p class = "length">{{f.length}} </p>
  
  <p id = "Offer"> Select a session: </p>
  <div id = "session-selector">
    @for(session of sessionsWithCinema(); track session.session_id){
       <div class = "session-card">
        <button [routerLink] = "['hall', session.hall, session.session_id]" routerLinkActive = "active-button">
            <div class = "session-cinema">{{session.cinema_name}}</div>
           <span class = "halle">Hall {{session.hall % 10}} </span>
           <span class = "times">{{session.start_time | date: "HH:mm"}}-{{session.end_time | date: "HH:mm"}} </span>
           <span class = "payment">{{session.cost}} </span>
          </button>
        </div>
      }
  </div>


  <!-- <button (click)="buyTicket()">Confirm Purchase</button>-->
  </div>
}
  @else{
    <div> Something is happening here....</div>
  }
  <div class = "right-partbooking">
    <router-outlet></router-outlet>
  </div>
</div>
