<h2>Buy Ticket</h2>

<p>Film ID: {{ filmId }}</p>

<div>
  <label>Select seat:</label>
  <div id = "session-selector">
    @for(ticket of tickets(); track ticket.ticket_id){
       <button (onClick) = "bookTicket">{{ticket.ticket_id}}</button>
      }
  </div>
</div>

<br />

<button (click)="buyTicket()">Confirm Purchase</button>
